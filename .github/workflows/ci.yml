name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Lays out ~/.cyrius/versions/<VERSION>/{bin,lib} and symlinks
        # ~/.cyrius/{bin,lib} -> versions/<VERSION>/{bin,lib}. v5.10.9+
        # cc5 resolves arch-peer includes (e.g. syscalls_x86_64_linux.cyr)
        # against the version-pinned path; the un-versioned ~/.cyrius/lib
        # layout that worked pre-5.10.9 no longer finds peer files.
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          VERSIONED="$HOME/.cyrius/versions/$CYRIUS_VERSION"
          mkdir -p "$VERSIONED/bin" "$VERSIONED/lib"
          cp "$CYRIUS_DIR/bin/"* "$VERSIONED/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$VERSIONED/lib/" 2>/dev/null || true
          chmod +x "$VERSIONED/bin/"* 2>/dev/null || true
          ln -sfn "$VERSIONED/bin" "$HOME/.cyrius/bin"
          ln -sfn "$VERSIONED/lib" "$HOME/.cyrius/lib"
          echo "$CYRIUS_VERSION" > "$HOME/.cyrius/current"
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Sync stdlib snapshot
        # cyrius 6.0.x serves stdlib from the version-pinned snapshot;
        # `cyrius lib sync` copies it into ./lib so the `[deps] stdlib`
        # presence-check in `cyrius deps` resolves. (Pre-6.0, `cyrius
        # deps` copied stdlib itself; that job moved to `lib sync`.)
        run: cyrius lib sync

      - name: Resolve dependencies
        run: cyrius deps

      - name: Verify dep hashes
        # Skip on the first push that introduces a new dep before
        # cyrius.lock is generated and committed. Once present, enforce.
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Format check
        # `cyrius fmt <file>` writes the formatted source to stdout; diff
        # against the committed file catches drift. (`--check` only sets
        # the exit code; it does NOT emit the formatted output, so diffing
        # its stdout always reports spurious drift.)
        run: |
          fail=0
          for f in src/*.cyr tests/tcyr/*.tcyr tests/bcyr/*.bcyr; do
            [ -f "$f" ] || continue
            if ! diff -q <(cyrius fmt "$f" 2>/dev/null) "$f" > /dev/null; then
              echo "needs fmt: $f"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "fmt: drift detected"; exit 1; }

      - name: Lint
        # Auto-discover so new modules are covered without editing CI.
        # Treat any warning as a failure (fail on any cyrlint "  warn " line).
        run: |
          fail=0
          for f in src/*.cyr tests/tcyr/*.tcyr tests/bcyr/*.bcyr; do
            [ -f "$f" ] || continue
            out=$(cyrius lint "$f" 2>&1)
            echo "$out"
            if echo "$out" | grep -qE '^\s*warn '; then
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present"; exit 1; }

      - name: Vet
        run: cyrius vet src/main.cyr

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/agnostik
          echo "agnostik: $(wc -c < build/agnostik) bytes"

      - name: Type-check (CYRIUS_TYPE_CHECK=1)
        # Verifies the v1.0.2 `: Str` annotation pass doesn't drift.
        # Filters stdlib self-flags (warnings format the path as
        # `lib/<file>.cyr` — no leading slash). Routes output through
        # a tempfile because $(...) drops null bytes that show up in
        # mixed cyrius stderr streams, which made the prior shape
        # spuriously trip a bash warning. Becomes redundant if cyrius
        # ever flips CYRIUS_TYPE_CHECK default-on.
        run: |
          tmp=$(mktemp)
          CYRIUS_TYPE_CHECK=1 cyrius build src/main.cyr build/agnostik > "$tmp" 2>&1
          # `warning:lib/...` → stdlib self-flag; drop those.
          # `warning:src/...` or any other path → agnostik-side; fail.
          if grep -E "^warning:" "$tmp" | grep -vE "^warning:lib/" | head -1 | grep -q .; then
            echo "type-check: agnostik-side warnings present"
            grep -E "^warning:" "$tmp" | grep -vE "^warning:lib/"
            rm -f "$tmp"
            exit 1
          fi
          echo "type-check: no agnostik-side warnings"
          rm -f "$tmp"

      - name: Verify ELF
        run: xxd -l 4 build/agnostik | grep -q "7f45 4c46"

      - name: Verify API surface snapshot
        # Diffs `docs/api-surface.snapshot` against the current agnostik-
        # namespace public-fn surface (filtered via scripts/api-surface.sh
        # to drop stdlib platform peers that vary by build environment).
        # Fails on unexplained additions or removals.
        # Intentional API bumps regenerate via `scripts/api-surface.sh
        # update` and commit the new snapshot in the same PR. v1.0.5+ gate.
        run: scripts/api-surface.sh check

      - name: Verify dist bundle is in sync with src/
        run: |
          cyrius distlib
          if ! git diff --quiet dist/agnostik.cyr 2>/dev/null; then
            echo "ERROR: dist/agnostik.cyr is stale. Run 'cyrius distlib' and commit."
            git --no-pager diff dist/agnostik.cyr | head -40
            exit 1
          fi
          echo "dist bundle matches src/"

      - name: Cross-build aarch64
        # Best-effort: only when toolchain bundle includes cc5_aarch64.
        run: |
          if [ ! -x "$HOME/.cyrius/bin/cc5_aarch64" ]; then
            echo "::warning::cc5_aarch64 not shipped with Cyrius $CYRIUS_VERSION — skipping"
            exit 0
          fi
          CYRIUS_DCE=1 cyrius build --aarch64 src/main.cyr build/agnostik-aarch64
          file build/agnostik-aarch64 | grep -q "aarch64" || {
            echo "ERROR: agnostik-aarch64 is not aarch64 ELF"; exit 1; }
          echo "agnostik-aarch64: $(wc -c < build/agnostik-aarch64) bytes"

      - name: Test
        run: |
          fail=0
          for t in tests/tcyr/*.tcyr; do
            [ -f "$t" ] || continue
            name=$(basename "$t" .tcyr)
            echo "=== $name ==="
            if ! cyrius test "$t"; then
              echo "FAIL: $name"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "test failures"; exit 1; }

      - name: Bench
        run: cyrius bench tests/bcyr/agnostik.bcyr

      - name: Bench-regression gate
        # Compares the current bench run against the most recent committed
        # baseline in docs/benchmarks/history.csv. Fails on per-op slowdown
        # beyond the threshold (50% on ns-bracket, 80% on us-bracket — tuned
        # for CI noise + cyrius's whole-µs rounding). Skip via
        # [bench-regression-ack] in the HEAD commit message for intentional
        # perf trade-offs. Baseline updates ride history.csv on release.
        # v1.0.6+ gate.
        run: scripts/bench-regression.sh

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        # Matches code lines only — rejects patterns in # comments via awk.
        run: |
          FAIL=0
          scan() {
            local label="$1"; shift
            local pat="$1"; shift
            local hits
            hits=$(grep -rn "$pat" src/ 2>/dev/null | awk -F: '
              { line=$3; for(i=4;i<=NF;i++) line=line":"$i;
                sub(/^[[:space:]]+/,"",line);
                if (substr(line,1,1) != "#") print $1":"$2":"line }')
            if [ -n "$hits" ]; then
              echo "FAIL: $label"
              echo "$hits"
              FAIL=1
            fi
          }
          # No raw fork/execve/clone in a type-vocabulary library.
          scan "raw execve"   'syscall( *59'
          scan "raw fork"     'syscall( *57'
          scan "raw clone"    'syscall( *56'
          # sys_system in src/ is a hard fail — agnostik should never spawn.
          scan "sys_system"   '\bsys_system\s*('
          # Hardcoded system paths agnostik should never read/write.
          scan "writes to /etc"  '"/etc/'
          scan "writes to /bin"  '"/bin/'
          scan "writes to /sbin" '"/sbin/'
          # Unbounded stack buffers (>= 64KB — force heap review).
          awk -F: '
            /var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]/ {
              match($0, /\[[0-9]+\]/); s=substr($0,RSTART+1,RLENGTH-2); n=s+0;
              if (n >= 65536) print FILENAME":"NR": large stack buffer ("n" bytes): "$0
            }' src/*.cyr | tee /tmp/bigbuf.txt
          [ -s /tmp/bigbuf.txt ] && FAIL=1
          echo "security scan complete (fail: $FAIL)"
          exit $FAIL

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md \
                   CODE_OF_CONDUCT.md LICENSE CLAUDE.md cyrius.cyml \
                   docs/development/state.md docs/development/roadmap.md; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent (cyrius.cyml pulls VERSION via \${file:VERSION})"
