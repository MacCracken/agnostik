name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        run: cyrius deps

      - name: Verify dep hashes
        # Skip on the first push that introduces a new dep before
        # cyrius.lock is generated and committed. Once present, enforce.
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Format check
        # cyrius fmt --check writes the formatted source to stdout; diff
        # against the committed file catches drift.
        run: |
          fail=0
          for f in src/*.cyr tests/tcyr/*.tcyr tests/bcyr/*.bcyr; do
            [ -f "$f" ] || continue
            if ! diff -q <(cyrius fmt "$f" --check 2>/dev/null) "$f" > /dev/null; then
              echo "needs fmt: $f"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "fmt: drift detected"; exit 1; }

      - name: Lint
        # Auto-discover so new modules are covered without editing CI.
        # Treat any warning as a failure (fail on any cyrlint "  warn " line).
        run: |
          fail=0
          for f in src/*.cyr tests/tcyr/*.tcyr tests/bcyr/*.bcyr; do
            [ -f "$f" ] || continue
            out=$(cyrius lint "$f" 2>&1)
            echo "$out"
            if echo "$out" | grep -qE '^\s*warn '; then
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present"; exit 1; }

      - name: Vet
        run: cyrius vet src/main.cyr

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/agnostik
          echo "agnostik: $(wc -c < build/agnostik) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/agnostik | grep -q "7f45 4c46"

      - name: Verify dist bundle is in sync with src/
        run: |
          cyrius distlib
          if ! git diff --quiet dist/agnostik.cyr 2>/dev/null; then
            echo "ERROR: dist/agnostik.cyr is stale. Run 'cyrius distlib' and commit."
            git --no-pager diff dist/agnostik.cyr | head -40
            exit 1
          fi
          echo "dist bundle matches src/"

      - name: Cross-build aarch64
        # Best-effort: only when toolchain bundle includes cc5_aarch64.
        run: |
          if [ ! -x "$HOME/.cyrius/bin/cc5_aarch64" ]; then
            echo "::warning::cc5_aarch64 not shipped with Cyrius $CYRIUS_VERSION — skipping"
            exit 0
          fi
          CYRIUS_DCE=1 cyrius build --aarch64 src/main.cyr build/agnostik-aarch64
          file build/agnostik-aarch64 | grep -q "aarch64" || {
            echo "ERROR: agnostik-aarch64 is not aarch64 ELF"; exit 1; }
          echo "agnostik-aarch64: $(wc -c < build/agnostik-aarch64) bytes"

      - name: Test
        run: |
          fail=0
          for t in tests/tcyr/*.tcyr; do
            [ -f "$t" ] || continue
            name=$(basename "$t" .tcyr)
            echo "=== $name ==="
            if ! cyrius test "$t"; then
              echo "FAIL: $name"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "test failures"; exit 1; }

      - name: Bench
        run: cyrius bench tests/bcyr/agnostik.bcyr

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        # Matches code lines only — rejects patterns in # comments via awk.
        run: |
          FAIL=0
          scan() {
            local label="$1"; shift
            local pat="$1"; shift
            local hits
            hits=$(grep -rn "$pat" src/ 2>/dev/null | awk -F: '
              { line=$3; for(i=4;i<=NF;i++) line=line":"$i;
                sub(/^[[:space:]]+/,"",line);
                if (substr(line,1,1) != "#") print $1":"$2":"line }')
            if [ -n "$hits" ]; then
              echo "FAIL: $label"
              echo "$hits"
              FAIL=1
            fi
          }
          # No raw fork/execve/clone in a type-vocabulary library.
          scan "raw execve"   'syscall( *59'
          scan "raw fork"     'syscall( *57'
          scan "raw clone"    'syscall( *56'
          # sys_system in src/ is a hard fail — agnostik should never spawn.
          scan "sys_system"   '\bsys_system\s*('
          # Hardcoded system paths agnostik should never read/write.
          scan "writes to /etc"  '"/etc/'
          scan "writes to /bin"  '"/bin/'
          scan "writes to /sbin" '"/sbin/'
          # Unbounded stack buffers (>= 64KB — force heap review).
          awk -F: '
            /var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]/ {
              match($0, /\[[0-9]+\]/); s=substr($0,RSTART+1,RLENGTH-2); n=s+0;
              if (n >= 65536) print FILENAME":"NR": large stack buffer ("n" bytes): "$0
            }' src/*.cyr | tee /tmp/bigbuf.txt
          [ -s /tmp/bigbuf.txt ] && FAIL=1
          echo "security scan complete (fail: $FAIL)"
          exit $FAIL

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md \
                   CODE_OF_CONDUCT.md LICENSE CLAUDE.md cyrius.cyml \
                   docs/development/state.md docs/development/roadmap.md; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent (cyrius.cyml pulls VERSION via \${file:VERSION})"
