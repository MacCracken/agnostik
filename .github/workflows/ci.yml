name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CYRIUS_VERSION: "1.9.4"

jobs:
  # ── Build ──
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          export CYRIUS_HOME="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p build
          cp "$CYRIUS_HOME/bin/cc2" ./build/cc2
          chmod +x ./build/cc2
          echo "Cyrius $CYRIUS_VERSION installed"

      - name: Build test binary
        run: |
          cat src/main.cyr | ./build/cc2 > build/agnostik_test
          chmod +x build/agnostik_test
          echo "test binary: $(wc -c < build/agnostik_test) bytes"

      - name: Build bench binary
        run: |
          cat benches/bench.cyr | ./build/cc2 > build/agnostik_bench
          chmod +x build/agnostik_bench
          echo "bench binary: $(wc -c < build/agnostik_bench) bytes"

  # ── Check & Format ──
  check:
    name: Check & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          export CYRIUS_HOME="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p build
          cp "$CYRIUS_HOME/bin/cc2" ./build/cc2
          cp "$CYRIUS_HOME/bin/cyrb" ./build/cyrb
          cp -r "$CYRIUS_HOME/bin/cyr"* ./build/ 2>/dev/null || true
          chmod +x ./build/cc2 ./build/cyrb

      - name: Syntax check
        run: ./build/cyrb check src/main.cyr
        continue-on-error: true

      - name: Format check
        run: |
          for f in src/*.cyr; do
            ./build/cyrb fmt "$f" --check || echo "WARN: $f needs formatting"
          done
        continue-on-error: true

      - name: Lint
        run: |
          for f in src/*.cyr; do
            ./build/cyrb lint "$f" || true
          done
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-x86_64
          path: |
            build/agnostik_test
            build/agnostik_bench
          retention-days: 5

  # ── Tests ──
  test:
    name: Test
    needs: [build, check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-x86_64
          path: build

      - name: Run test suite
        run: |
          chmod +x build/agnostik_test
          OUTPUT=$(./build/agnostik_test 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "0 failed"
          echo "PASS: all tests"

  # ── Benchmarks ──
  benchmarks:
    name: Benchmarks
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-x86_64
          path: build

      - name: Run benchmarks
        run: |
          chmod +x build/agnostik_bench
          ./build/agnostik_bench
        continue-on-error: true

  # ── Security ──
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for dangerous patterns
        run: |
          WARN=0
          # Check for raw execve
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# "; then
            echo "WARN: raw execve in modules"
            WARN=1
          fi
          # Check for hardcoded sensitive paths
          if grep -rn '"/etc/shadow"' src/ 2>/dev/null; then
            echo "WARN: direct shadow file access"
            WARN=1
          fi
          echo "security scan complete (warnings: $WARN)"

  # ── Documentation ──
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required docs exist
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE cyrb.toml; do
            if [ -f "$doc" ]; then
              echo "  OK: $doc"
            else
              echo "  MISSING: $doc"
              MISSING=1
            fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          TOML_VERSION=$(grep '^version' cyrb.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "VERSION file: $VERSION"
          echo "cyrb.toml:    $TOML_VERSION"
          if [ "$VERSION" != "$TOML_VERSION" ]; then
            echo "FAIL: version mismatch"
            exit 1
          fi
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in changelog"; exit 1; }
          echo "Version consistent"
