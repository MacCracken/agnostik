name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CYRIUS_VERSION: "2.6.4"

jobs:
  # ── Build ──
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          export CYRIUS_HOME="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p build
          cp "$CYRIUS_HOME/bin/"* ./build/ 2>/dev/null || true
          chmod +x ./build/*
          echo "$PWD/build" >> $GITHUB_PATH
          echo "Cyrius $CYRIUS_VERSION installed"

      - name: Build test binary
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/agnostik_test
          echo "test binary: $(wc -c < build/agnostik_test) bytes"

      - name: Build library
        run: |
          cyrius build src/lib.cyr build/agnostik_lib || echo "lib build: warnings (expected — consumers provide stdlib)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-x86_64
          path: |
            build/agnostik_test
          retention-days: 5

  # ── Check & Format ──
  check:
    name: Check & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          export CYRIUS_HOME="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p build
          cp "$CYRIUS_HOME/bin/"* ./build/ 2>/dev/null || true
          chmod +x ./build/*
          echo "$PWD/build" >> $GITHUB_PATH

      - name: Syntax check
        run: cyrius check src/main.cyr

      - name: Format check
        run: |
          fail=0
          for f in src/*.cyr; do
            cyrfmt "$f" > /tmp/fmt_check 2>/dev/null
            if ! diff -q "$f" /tmp/fmt_check > /dev/null 2>&1; then
              echo "needs formatting: $(basename $f)"
              fail=1
            fi
          done
          rm -f /tmp/fmt_check
          test $fail -eq 0

  # ── Security ──
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        run: |
          WARN=0
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# "; then
            echo "WARN: raw execve in modules"; WARN=1
          fi
          echo "security scan complete (warnings: $WARN)"

  # ── Tests ──
  test:
    name: Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          export CYRIUS_HOME="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p build
          cp "$CYRIUS_HOME/bin/"* ./build/ 2>/dev/null || true
          chmod +x ./build/*
          echo "$PWD/build" >> $GITHUB_PATH

      - name: Run test suite
        run: cyrius test

  # ── Benchmarks ──
  benchmarks:
    name: Benchmarks
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          export CYRIUS_HOME="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p build
          cp "$CYRIUS_HOME/bin/"* ./build/ 2>/dev/null || true
          chmod +x ./build/*
          echo "$PWD/build" >> $GITHUB_PATH

      - name: Run benchmarks
        run: cyrius bench
        continue-on-error: true

  # ── Documentation ──
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE cyrius.toml; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING
      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          TOML_VERSION=$(grep '^version' cyrius.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "VERSION: $VERSION  cyrius.toml: $TOML_VERSION"
          [ "$VERSION" = "$TOML_VERSION" ] || { echo "FAIL: version mismatch"; exit 1; }
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in changelog"; exit 1; }
          echo "Version consistent"
