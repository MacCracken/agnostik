name: Release

on:
  push:
    # Accept both `v1.2.3` and `1.2.3` tag styles. Version-verify enforces
    # semver shape + match against VERSION file.
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="${GITHUB_REF_NAME#v}"   # strip optional leading 'v' so v1.0.0 == 1.0.0
          echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "tag ($TAG) is not semver x.y.z"; exit 1; }
          [ "$FILE_VERSION" = "$TAG" ] || {
            echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          echo "Version verified: $TAG (cyrius.cyml pulls from VERSION via \${file:VERSION})"

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve deps
        run: cyrius deps

      - name: Verify dep hashes
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/agnostik
          echo "agnostik: $(wc -c < build/agnostik) bytes"

      - name: Cross-build aarch64 (best-effort)
        run: |
          if [ -x "$HOME/.cyrius/bin/cc5_aarch64" ]; then
            CYRIUS_DCE=1 cyrius build --aarch64 src/main.cyr build/agnostik-aarch64
            echo "agnostik-aarch64: $(wc -c < build/agnostik-aarch64) bytes"
          else
            echo "::warning::cc5_aarch64 not in toolchain — aarch64 binary skipped"
          fi

      - name: Test
        run: |
          for t in tests/tcyr/*.tcyr; do
            [ -f "$t" ] || continue
            cyrius test "$t"
          done

      - name: Regenerate dist bundle
        run: cyrius distlib

      - name: Clean toolchain artifacts
        run: rm -f cyrius-*.tar.gz

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="agnostik-${TAG}/" -o "agnostik-${TAG}-src.tar.gz" HEAD
          if [ -f dist/agnostik.cyr ]; then
            cp dist/agnostik.cyr "agnostik-${TAG}.cyr"
          fi
          if [ -f build/agnostik ]; then
            cp build/agnostik "agnostik-${TAG}-x86_64-linux"
          fi
          if [ -f build/agnostik-aarch64 ]; then
            cp build/agnostik-aarch64 "agnostik-${TAG}-aarch64-linux"
          fi
          sha256sum agnostik-*.tar.gz agnostik-*.cyr agnostik-*-linux 2>/dev/null > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            agnostik-*.tar.gz
            agnostik-*.cyr
            agnostik-*-linux
            cyrius.lock
            SHA256SUMS

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
      - name: Changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk "/^## \\[${TAG}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" \
            CHANGELOG.md > /tmp/body.md
      - uses: softprops/action-gh-release@v2
        with:
          name: "agnostik ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') || startsWith(github.ref_name, 'v0.') }}
          files: |
            agnostik-*.tar.gz
            agnostik-*.cyr
            agnostik-*-linux
            cyrius.lock
            SHA256SUMS
